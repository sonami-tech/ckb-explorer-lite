services:
  ckb-explorer-lite:
    image: ghcr.io/sonami-tech/ckb-explorer-lite:latest
    container_name: ckb-explorer-lite-production
    ports:
      - "0.0.0.0:3020:80"
    volumes:
      - ./config.json5:/usr/share/nginx/html/config.json5:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
